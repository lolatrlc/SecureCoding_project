<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.title} + ' — BookNook'">Book — BookNook</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f4ede0; --surface: #fcfaf3; --surface-2: #efe6d4;
            --border: #d4c5a8; --accent: #5d7052; --accent-hover: #4a5a42;
            --accent-soft: #8ba384; --rose: #b88a8a; --rose-soft: #d9b3b3;
            --ink: #2a3027; --text-muted: #6b6557;
            --success: #5d7052; --danger: #a83232; --gold: #b8946a;
        }
        body { background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        a { color: var(--accent); text-decoration: none; }
        .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; box-shadow: 0 1px 3px rgba(45,55,40,0.05); }
        .navbar-brand { display: flex; align-items: center; gap: 0.7rem; font-size: 1.4rem; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; font-family: 'Georgia', serif; font-style: italic; }
        .navbar-brand .accent { color: var(--accent); }
        .brand-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%); border-radius: 4px; display: flex; align-items: center; justify-content: center; transform: rotate(-3deg); }
        .brand-icon svg { width: 22px; height: 22px; fill: var(--surface); }
        .navbar-nav { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .navbar-nav a { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        .user-badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; padding: 0.25rem 0.85rem; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

        .btn { display: inline-flex; align-items: center; padding: 0.55rem 1.1rem; border-radius: 4px; border: 1px solid transparent; font-size: 0.875rem; font-weight: 700; cursor: pointer; transition: all 0.15s; text-decoration: none; }
        .btn-primary { background: var(--accent); color: var(--surface); }
        .btn-primary:hover { background: var(--accent-hover); color: var(--surface); }
        .btn-outline { background: transparent; color: var(--ink); border-color: var(--border); }
        .btn-outline:hover { background: var(--surface-2); color: var(--accent); border-color: var(--accent); }
        .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: var(--surface); }
        .btn-sm { padding: 0.32rem 0.75rem; font-size: 0.8rem; }

        .main { max-width: 880px; margin: 0 auto; padding: 2rem 1.5rem; }
        .breadcrumb { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; font-weight: 500; }

        .detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 8px 30px rgba(45,55,40,0.1); position: relative; }
        .detail-card::before { content: ''; position: absolute; top: 12px; left: 12px; right: 12px; bottom: 12px; border: 1px solid var(--border); border-radius: 4px; pointer-events: none; opacity: 0.3; z-index: 0; }

        .status-stripe-large { height: 6px; position: relative; z-index: 1; }
        .status-stripe-large.want_to_read       { background: var(--rose-soft); }
        .status-stripe-large.currently_reading  { background: linear-gradient(90deg, var(--gold) 0%, var(--accent-soft) 100%); }
        .status-stripe-large.finished           { background: var(--accent); }
        .status-stripe-large.dnf                { background: var(--danger); opacity: 0.5; }
        .status-stripe-large.paused             { background: var(--text-muted); }

        .hero { padding: 2.5rem 2rem 1.5rem; background: linear-gradient(135deg, var(--surface-2) 0%, var(--surface) 100%); border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
        .book-title { font-size: 2.2rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 0.4rem; font-family: 'Georgia', serif; line-height: 1.15; }
        .author-name { font-size: 1.2rem; color: var(--accent); font-weight: 600; font-style: italic; margin-bottom: 0.25rem; }
        .series-line { font-size: 0.95rem; color: var(--text-muted); font-style: italic; margin-bottom: 1rem; }

        .stars-large { display: inline-flex; gap: 0.15rem; font-size: 1.4rem; margin-bottom: 1rem; }
        .star-filled { color: var(--gold); }
        .star-empty { color: var(--border); }

        .badges-row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
        .badge { display: inline-block; padding: 0.3rem 0.75rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.3px; }
        .badge-status { font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-status-want_to_read       { background: rgba(217,179,179,0.2); color: var(--rose); border: 1px solid rgba(184,138,138,0.4); }
        .badge-status-currently_reading  { background: rgba(184,148,106,0.15); color: var(--gold); border: 1px solid rgba(184,148,106,0.4); }
        .badge-status-finished           { background: rgba(93,112,82,0.12); color: var(--accent); border: 1px solid rgba(93,112,82,0.3); }
        .badge-status-dnf                { background: rgba(168,50,50,0.08); color: var(--danger); border: 1px solid rgba(168,50,50,0.25); }
        .badge-status-paused             { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
        .badge-genre { background: rgba(93,112,82,0.08); color: var(--accent); border: 1px solid rgba(93,112,82,0.2); }
        .badge-format { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
        .flag-challenge { background: rgba(184,148,106,0.15); color: var(--gold); border: 1px solid rgba(184,148,106,0.4); padding: 0.3rem 0.75rem; border-radius: 4px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; }
        .flag-rereadable { background: rgba(184,138,138,0.15); color: var(--rose); border: 1px solid rgba(184,138,138,0.4); padding: 0.3rem 0.75rem; border-radius: 4px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; }

        .body-section { padding: 2rem; position: relative; z-index: 1; }
        .section-title { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 0.85rem; font-weight: 700; }
        .ornament { text-align: center; color: var(--accent-soft); font-size: 1.2rem; margin: 1.5rem 0; letter-spacing: 0.5em; }

        .reading-progress-card { background: linear-gradient(135deg, var(--gold) 0%, var(--accent-soft) 100%); color: var(--surface); padding: 1.5rem; border-radius: 6px; margin-bottom: 1.5rem; }
        .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.75rem; }
        .progress-title { font-size: 0.85rem; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.7px; font-weight: 700; }
        .progress-percent { font-size: 2rem; font-weight: 800; font-family: 'Georgia', serif; }
        .progress-bar-large { height: 10px; background: rgba(255,255,255,0.25); border-radius: 5px; overflow: hidden; margin-bottom: 0.5rem; }
        .progress-fill-large { height: 100%; background: var(--surface); border-radius: 5px; }
        .progress-pages { font-size: 0.85rem; opacity: 0.95; font-weight: 600; }

        .timeline-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.85rem; margin-bottom: 1.75rem; }
        .timeline-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 0.95rem 1rem; }
        .timeline-icon { font-size: 1.3rem; margin-bottom: 0.4rem; }
        .timeline-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; font-weight: 700; margin-bottom: 0.25rem; }
        .timeline-date { font-size: 0.95rem; font-weight: 700; color: var(--ink); font-family: 'Georgia', serif; }

        .quote-section { background: linear-gradient(135deg, rgba(184,148,106,0.08) 0%, transparent 100%); border-left: 4px solid var(--gold); padding: 1.5rem 1.5rem 1.5rem 2rem; border-radius: 0 6px 6px 0; margin-bottom: 1.5rem; position: relative; }
        .quote-section::before { content: '"'; position: absolute; top: 0.5rem; left: 0.6rem; font-size: 4rem; color: var(--gold); opacity: 0.3; font-family: 'Georgia', serif; line-height: 1; }
        .quote-text { color: var(--ink); line-height: 1.7; font-size: 1.05rem; font-style: italic; font-family: 'Georgia', serif; position: relative; z-index: 1; }

        .mood-section { background: linear-gradient(135deg, rgba(184,138,138,0.06) 0%, transparent 100%); border-left: 4px solid var(--rose-soft); padding: 1.1rem 1.25rem; border-radius: 0 6px 6px 0; margin-bottom: 1.5rem; }
        .mood-text { color: var(--ink); line-height: 1.6; font-size: 0.95rem; font-style: italic; }

        .triggers-section { background: rgba(168,50,50,0.04); border-left: 4px solid var(--danger); padding: 1rem 1.25rem; border-radius: 0 6px 6px 0; margin-bottom: 1.5rem; }
        .triggers-title { font-size: 0.78rem; color: var(--danger); text-transform: uppercase; letter-spacing: 0.7px; font-weight: 700; margin-bottom: 0.4rem; }
        .triggers-text { color: var(--ink); line-height: 1.5; font-size: 0.88rem; }

        .review-section { margin-bottom: 1.5rem; padding: 1rem 1.25rem; background: var(--surface-2); border-radius: 6px; }
        .review-text { color: var(--ink); line-height: 1.7; font-size: 0.95rem; padding: 0.5rem 0; }

        .info-rows { padding: 0.5rem 0 1rem; border-top: 1px solid var(--border); }
        .info-row { display: flex; padding: 0.6rem 0; font-size: 0.88rem; }
        .info-key { flex: 0 0 140px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.72rem; padding-top: 0.1rem; }
        .info-val { color: var(--ink); font-weight: 500; flex: 1; }

        .action-row { display: flex; gap: 0.75rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/books}">
        <span class="brand-icon"><svg viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg></span>
        <span><span class="accent">Book</span>Nook</span>
    </a>
    <ul class="navbar-nav">
        <li><a th:href="@{/books}">My Library</a></li>
        <li><span class="user-badge" sec:authentication="name">user</span></li>
        <li>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-outline btn-sm">Logout</button>
            </form>
        </li>
    </ul>
</nav>

<div class="main">
    <div class="breadcrumb">
        <a th:href="@{/books}">My Library</a> / <span th:text="${book.title}"></span>
    </div>

    <div class="detail-card">
        <div class="status-stripe-large" th:classappend="${#strings.toLowerCase(book.status.name())}"></div>

        <div class="hero">
            <div class="book-title" th:text="${book.title}"></div>
            <div class="author-name" th:text="'by ' + ${book.author}"></div>
            <div class="series-line"
                 th:if="${book.seriesName != null and !book.seriesName.isBlank()}">
                <span th:text="${book.seriesName}"></span>
                <span th:if="${book.seriesNumber != null}" th:text="' (Book #' + ${book.seriesNumber} + ')'"></span>
            </div>

            <div class="stars-large" th:if="${book.rating != null}">
                <span th:each="i : ${#numbers.sequence(1,5)}"
                      th:classappend="${i <= book.rating} ? 'star-filled' : 'star-empty'"
                      th:text="${i <= book.rating} ? '★' : '☆'"></span>
            </div>

            <div class="badges-row">
                <span class="badge badge-status"
                      th:classappend="'badge-status-' + ${#strings.toLowerCase(book.status.name())}"
                      th:text="${#strings.replace(book.status.name(),'_',' ')}"></span>
                <span class="badge badge-genre"
                      th:text="${#strings.replace(book.genre.name(),'_',' ')}"></span>
                <span class="badge badge-format"
                      th:text="${#strings.replace(book.format.name(),'_',' ')}"></span>
                <span class="flag-challenge" th:if="${book.partOfChallenge}">📚 Challenge</span>
                <span class="flag-rereadable" th:if="${book.reReadable}">♡ Re-readable</span>
            </div>
        </div>

        <div class="body-section">

            <div class="reading-progress-card"
                 th:if="${book.status.name() == 'CURRENTLY_READING' and book.pageCount != null and book.currentPage != null}"
                 th:with="percent=${(book.currentPage * 100) / book.pageCount}">
                <div class="progress-header">
                    <span class="progress-title">Currently Reading</span>
                    <span class="progress-percent" th:text="${percent} + '%'"></span>
                </div>
                <div class="progress-bar-large">
                    <div class="progress-fill-large" th:style="'width:' + ${percent} + '%'"></div>
                </div>
                <div class="progress-pages" th:text="'Page ' + ${book.currentPage} + ' of ' + ${book.pageCount}"></div>
            </div>

            <div class="timeline-grid"
                 th:if="${book.startedReading != null or book.finishedReading != null or book.addedDate != null or book.publicationYear != null}">
                <div class="timeline-card" th:if="${book.startedReading != null}">
                    <div class="timeline-icon">📖</div>
                    <div class="timeline-label">Started</div>
                    <div class="timeline-date" th:text="${#temporals.format(book.startedReading, 'dd MMM yyyy')}"></div>
                </div>
                <div class="timeline-card" th:if="${book.finishedReading != null}">
                    <div class="timeline-icon">✓</div>
                    <div class="timeline-label">Finished</div>
                    <div class="timeline-date" th:text="${#temporals.format(book.finishedReading, 'dd MMM yyyy')}"></div>
                </div>
                <div class="timeline-card" th:if="${book.addedDate != null}">
                    <div class="timeline-icon">📥</div>
                    <div class="timeline-label">Added to Library</div>
                    <div class="timeline-date" th:text="${#temporals.format(book.addedDate, 'dd MMM yyyy')}"></div>
                </div>
                <div class="timeline-card" th:if="${book.publicationYear != null}">
                    <div class="timeline-icon">📅</div>
                    <div class="timeline-label">Published</div>
                    <div class="timeline-date" th:text="${book.publicationYear}"></div>
                </div>
            </div>

            <div class="quote-section" th:if="${book.favoriteQuote != null and !book.favoriteQuote.isBlank()}">
                <div class="section-title">Favorite Quote</div>
                <p class="quote-text" th:text="${book.favoriteQuote}"></p>
            </div>

            <div class="mood-section" th:if="${book.moodAtmosphere != null and !book.moodAtmosphere.isBlank()}">
                <div class="section-title">Mood &amp; Atmosphere</div>
                <p class="mood-text" th:text="${book.moodAtmosphere}"></p>
            </div>

            <div class="triggers-section" th:if="${book.triggerWarnings != null and !book.triggerWarnings.isBlank()}">
                <div class="triggers-title">⚠ Trigger Warnings</div>
                <p class="triggers-text" th:text="${book.triggerWarnings}"></p>
            </div>

            <div class="ornament" th:if="${book.review != null and !book.review.isBlank()}">~ • ~</div>

            <div class="review-section" th:if="${book.review != null and !book.review.isBlank()}">
                <div class="section-title">My Review</div>
                <p class="review-text" th:text="${book.review}"></p>
            </div>

            <div class="review-section" th:if="${book.personalNotes != null and !book.personalNotes.isBlank()}">
                <div class="section-title">Personal Notes</div>
                <p class="review-text" th:text="${book.personalNotes}"></p>
            </div>

            <div class="info-rows">
                <div class="info-row" th:if="${book.publisher != null and !book.publisher.isBlank()}">
                    <div class="info-key">Publisher</div>
                    <div class="info-val" th:text="${book.publisher}"></div>
                </div>
                <div class="info-row" th:if="${book.isbn != null and !book.isbn.isBlank()}">
                    <div class="info-key">ISBN</div>
                    <div class="info-val" style="font-family: monospace;" th:text="${book.isbn}"></div>
                </div>
                <div class="info-row" th:if="${book.pageCount != null}">
                    <div class="info-key">Pages</div>
                    <div class="info-val" th:text="${book.pageCount}"></div>
                </div>
                <div class="info-row">
                    <div class="info-key">Owned Copy</div>
                    <div class="info-val" th:text="${book.ownedCopy} ? '✓ Yes' : '✗ No'"></div>
                </div>
                <div class="info-row" th:if="${book.addedBy != null}">
                    <div class="info-key">Added by</div>
                    <div class="info-val" th:text="${book.addedBy}"></div>
                </div>
            </div>

            <div class="action-row">
                <a th:href="@{/books}" class="btn btn-outline">Back</a>
                <a th:href="@{/books/edit/{id}(id=${book.id})}"
                   class="btn btn-primary" sec:authorize="hasRole('ADMIN')">Edit</a>
                <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post"
                      sec:authorize="hasRole('ADMIN')" onsubmit="return confirm('Remove this book?')">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
