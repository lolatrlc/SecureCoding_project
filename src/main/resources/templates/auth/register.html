<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — BookNook</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f4ede0; --surface: #fcfaf3; --surface-2: #efe6d4;
            --border: #d4c5a8; --accent: #5d7052; --accent-hover: #4a5a42;
            --accent-soft: #8ba384; --rose: #b88a8a; --ink: #2a3027;
            --text-muted: #6b6557; --danger: #a83232;
        }
        body { background: linear-gradient(135deg, #f4ede0 0%, #ede2cd 100%); color: var(--ink); font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 12px 40px rgba(45,55,40,0.15); position: relative; }
        .auth-box::before { content: ''; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px; border: 1px solid var(--border); border-radius: 2px; pointer-events: none; opacity: 0.4; }
        .brand-section { text-align: center; margin-bottom: 2rem; position: relative; z-index: 1; }
        .brand-icon { width: 64px; height: 64px; margin: 0 auto 1rem; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%); border-radius: 4px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(93,112,82,0.3); transform: rotate(-3deg); }
        .brand-icon svg { width: 36px; height: 36px; fill: var(--surface); }
        .brand { font-size: 1.5rem; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; margin-bottom: 0.25rem; font-style: italic; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; font-style: italic; }
        .ornament { text-align: center; color: var(--accent-soft); font-size: 1.2rem; margin: 0.75rem 0; letter-spacing: 0.5em; }
        .form-group { margin-bottom: 1.1rem; position: relative; z-index: 1; }
        .form-label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; font-family: -apple-system, sans-serif; }
        .form-control { width: 100%; background: var(--surface-2); border: 1.5px solid var(--border); color: var(--ink); padding: 0.7rem 0.9rem; border-radius: 4px; font-size: 0.95rem; transition: all 0.15s; font-family: -apple-system, sans-serif; }
        .form-control:focus { outline: none; border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(93,112,82,0.1); }
        .form-control::placeholder { color: #aaa090; }
        .btn-submit { display: block; width: 100%; padding: 0.85rem; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%); color: var(--surface); border: none; border-radius: 4px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 1.5rem; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; box-shadow: 0 4px 12px rgba(93,112,82,0.25); font-family: -apple-system, sans-serif; position: relative; z-index: 1; }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(93,112,82,0.35); }
        .alert-danger { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1.25rem; font-size: 0.875rem; background: rgba(168,50,50,0.08); border: 1px solid rgba(168,50,50,0.25); color: var(--danger); font-family: -apple-system, sans-serif; position: relative; z-index: 1; }
        .field-error { color: var(--danger); font-size: 0.78rem; margin-top: 0.25rem; font-family: -apple-system, sans-serif; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted); font-family: -apple-system, sans-serif; position: relative; z-index: 1; }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
<div class="auth-box">
    <div class="brand-section">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg>
        </div>
        <div class="brand">Create Account</div>
        <div class="ornament">~ • ~</div>
        <div class="subtitle">Begin your reading journey.</div>
    </div>

    <div th:if="${errorMessage}" class="alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input id="username" class="form-control" type="text" th:field="*{username}" placeholder="your_handle" autocomplete="username">
            <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input id="email" class="form-control" type="email" th:field="*{email}" placeholder="you@example.com" autocomplete="email">
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input id="password" class="form-control" type="password" th:field="*{password}" placeholder="min. 6 characters" autocomplete="new-password">
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="footer-link">Already have an account? <a th:href="@{/auth/login}">Sign in</a></div>
</div>
</body>
</html>
